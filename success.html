<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Konsultasi Terkirim — HROne</title>

  <!-- Font Awesome Icons -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
  />

  <style>
    :root {
      --navy: #0f172a;
      --blue: #1e3a8a;
      --emerald: #10b981;
      --emerald-dark: #059669;
      --slate: #475569;
      --light: #f8fafc;
      --white: #ffffff;
      --border: #e2e8f0;
      --shadow: 0 20px 45px rgba(15, 23, 42, 0.12);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(16, 185, 129, 0.16), transparent 32%),
        radial-gradient(circle at top right, rgba(30, 58, 138, 0.16), transparent 36%),
        var(--light);
      display: grid;
      place-items: center;
      color: var(--navy);
      padding: 24px;
    }

    .success-card {
      max-width: 560px;
      width: 100%;
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 42px;
      text-align: center;
      box-shadow: var(--shadow);
    }

    .icon {
      width: 74px;
      height: 74px;
      border-radius: 50%;
      background: rgba(16, 185, 129, 0.12);
      color: var(--emerald);
      display: grid;
      place-items: center;
      font-size: 34px;
      margin: 0 auto 24px;
    }

    h1 {
      font-size: 34px;
      margin-bottom: 14px;
      color: var(--blue);
    }

    p {
      color: var(--slate);
      font-size: 17px;
      line-height: 1.7;
      margin-bottom: 28px;
    }

    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      padding: 13px 22px;
      border-radius: 999px;
      background: var(--emerald);
      color: white;
      text-decoration: none;
      font-weight: 700;
      transition: 0.25s ease;
    }

    a:hover {
      background: var(--emerald-dark);
      transform: translateY(-2px);
    }
  </style>
</head>

<body>
  <div class="success-card">
    <div class="icon">
      <i class="fa-solid fa-check"></i>
    </div>

    <h1>Konsultasi Terkirim</h1>

    <p>
      Terima kasih. Permintaan konsultasi Anda sudah kami terima.
      Tim GPRO Technology akan menghubungi Anda melalui email atau nomor telepon
      yang dicantumkan.
    </p>

    <a href="/">
      <i class="fa-solid fa-arrow-left"></i>
      Kembali ke Beranda
    </a>
  </div>
</body>
</html>
